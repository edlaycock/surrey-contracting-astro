name: Build & deploy to VPS

on:
  push:
    branches: [main]
  # Sanity webhook -> repository_dispatch fires this so client publishes rebuild
  repository_dispatch:
    types: [sanity-publish]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # Map secret to env so it can be referenced in step `if:` conditions
    # (the `secrets` context is not allowed directly in `if`).
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          PUBLIC_SANITY_PROJECT_ID: mhqgpyb9
          PUBLIC_SANITY_DATASET: production

      # Ship source to the VPS; the Docker image is built there.
      # --exclude=.env protects the server-only secrets file from --delete.
      - name: Rsync source to VPS
        if: ${{ env.SSH_HOST != '' }}
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -avzr --delete --exclude=.git --exclude=node_modules --exclude=dist --exclude=.astro --exclude=studio --exclude=.env
          path: ./
          remote_path: ${{ secrets.DEPLOY_PATH }}/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_KEY }}

      - name: Build & (re)start the isolated container
        if: ${{ env.SSH_HOST != '' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            docker compose up -d --build
            docker compose ps
