<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Black background -->
  <rect width="100" height="100" fill="#000000"/>
  <!-- White border -->
  <rect x="3" y="3" width="94" height="94" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <!-- S in gold -->
  <text x="28" y="72" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="72" fill="#E6A91A">S</text>
  <!-- C in white, offset right -->
  <text x="44" y="72" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="72" fill="#ffffff">C</text>
</svg>
