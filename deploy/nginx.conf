# Surrey Contracting — nginx vhost (system nginx on the VPS).
# Mirrors the existing site pattern (e.g. yourtradequotes.com): proxy the public
# domain to the app's localhost port; TLS managed by certbot.
#
# Install (one-time):
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/surreycontracting.co.uk
#   sudo ln -s /etc/nginx/sites-available/surreycontracting.co.uk /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo nginx -s reload
#   sudo certbot --nginx -d surreycontracting.co.uk -d www.surreycontracting.co.uk
# (certbot rewrites this to add the :443 server block + the 80->443 redirect,
#  exactly like the other vhosts on the box.)

server {
    listen 80;
    listen [::]:80;
    server_name surreycontracting.co.uk www.surreycontracting.co.uk;

    location / {
        proxy_pass http://127.0.0.1:4321;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
