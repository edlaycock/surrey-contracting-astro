# Surrey Contracting — nginx site config (Hostinger VPS)
# Serves the prerendered static site from dist/client and reverse-proxies the
# Astro Node server (PM2) for the only on-demand route: /api/*.
#
# Install: copy to /etc/nginx/sites-available/surreycontracting, symlink into
# sites-enabled, then `nginx -t && systemctl reload nginx`.
# TLS: run `certbot --nginx -d surreycontracting.co.uk -d www.surreycontracting.co.uk`
# (certbot will add the listen 443 / ssl_certificate lines automatically).

# --- Redirect www -> apex (adjust if you prefer www) ---
server {
    listen 80;
    listen [::]:80;
    server_name www.surreycontracting.co.uk;
    return 301 https://surreycontracting.co.uk$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name surreycontracting.co.uk;

    # Path to the built static output on the VPS:
    root /var/www/surrey-contracting/current/dist/client;
    index index.html;

    # gzip (Brotli even better if the module is available)
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/xml;
    gzip_min_length 1024;

    # --- Legacy URL redirects (preserve SEO from the old .html site) ---
    # /index.html -> /
    location = /index.html { return 301 /; }
    # Old service-* URLs -> new clean URLs
    location = /service-groundworks.html { return 301 /groundworks; }
    location = /service-earthworks.html  { return 301 /earthworks; }
    location = /service-surfacing.html   { return 301 /surfacing; }
    location = /service-demolition.html  { return 301 /demolition; }
    location = /service-groundworks      { return 301 /groundworks; }
    location = /service-earthworks       { return 301 /earthworks; }
    location = /service-surfacing        { return 301 /surfacing; }
    location = /service-demolition       { return 301 /demolition; }
    # Any remaining /foo.html -> /foo
    location ~ ^/(?<clean>.+)\.html$ { return 301 /$clean; }

    # --- API (Resend contact form) -> Astro Node server via PM2 ---
    location /api/ {
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $http_origin;
    }

    # --- Static site with clean URLs ---
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Long-cache fingerprinted assets
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
