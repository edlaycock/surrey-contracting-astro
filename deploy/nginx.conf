# Surrey Contracting — nginx vhost (system nginx on the VPS).
# TLS blocks are added/managed by certbot; do not edit those sections manually.
#
# Update live config:
#   sudo cp deploy/nginx.conf /etc/nginx/conf.d/surreycontracting.conf
#   sudo nginx -t && sudo nginx -s reload

# 1. www → non-www canonical redirect (301)
server {
    listen 80;
    listen [::]:80;
    server_name www.surreycontracting.co.uk;
    return 301 https://surreycontracting.co.uk$request_uri;
}

# 2. Trailing-slash → no-trailing-slash redirect for non-root paths (301)
server {
    listen 80;
    listen [::]:80;
    server_name surreycontracting.co.uk;

    location ~ ^(.+)/$ {
        return 301 $scheme://surreycontracting.co.uk$1;
    }

    location / {
        proxy_pass http://127.0.0.1:4321;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
